# =============================================================================
# SimpleAuth — Docker Compose
# =============================================================================
#
# Quick start (minimal):
#   docker compose up -d simpleauth
#
# Full stack with nginx SSL termination:
#   1. Place your TLS cert/key in deploy/nginx/certs/
#   2. docker compose --profile full up -d
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # SimpleAuth — core authentication service
  # ---------------------------------------------------------------------------
  simpleauth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "${VERSION:-latest}"
    image: simpleauth:latest
    container_name: simpleauth
    restart: unless-stopped

    environment:
      # --- Required -----------------------------------------------------------
      AUTH_ADMIN_KEY: "${AUTH_ADMIN_KEY:-}"                  # Master admin key (auto-generated if empty; set for persistence)

      # --- Identity -----------------------------------------------------------
      AUTH_HOSTNAME: "${AUTH_HOSTNAME:-localhost}"            # FQDN for TLS certificate SANs
      AUTH_PROJECT_NAME: "${AUTH_PROJECT_NAME:-default}"      # Project namespace (useful for multi-instance setups)

      # --- Networking ---------------------------------------------------------
      AUTH_PORT: "8080"                                      # HTTPS listen port inside container
      AUTH_HTTP_PORT: ""                                      # Disable HTTP redirect (nginx handles it)

      # --- JWT ----------------------------------------------------------------
      AUTH_JWT_ISSUER: "${AUTH_JWT_ISSUER:-simpleauth}"
      AUTH_JWT_ACCESS_TTL: "${AUTH_JWT_ACCESS_TTL:-8h}"
      AUTH_JWT_REFRESH_TTL: "${AUTH_JWT_REFRESH_TTL:-720h}"
      AUTH_IMPERSONATE_TTL: "${AUTH_IMPERSONATE_TTL:-1h}"

      # --- Kerberos / SPNEGO (optional) ---------------------------------------
      # AUTH_KRB5_KEYTAB: "/data/krb5.keytab"
      # AUTH_KRB5_REALM: "CORP.EXAMPLE.COM"

      # --- TLS (optional — auto-generates self-signed if empty) ---------------
      # AUTH_TLS_CERT: "/data/tls.crt"
      # AUTH_TLS_KEY: "/data/tls.key"

      # --- Security -----------------------------------------------------------
      AUTH_RATE_LIMIT_MAX: "${AUTH_RATE_LIMIT_MAX:-10}"
      AUTH_RATE_LIMIT_WINDOW: "${AUTH_RATE_LIMIT_WINDOW:-1m}"
      AUTH_AUDIT_RETENTION: "${AUTH_AUDIT_RETENTION:-2160h}"  # 90 days
      AUTH_CORS_ORIGINS: "${AUTH_CORS_ORIGINS:-}"

    volumes:
      - simpleauth-data:/data          # BoltDB, auto-generated certs, keytabs

    ports:
      - "${SIMPLEAUTH_PORT:-8080}:8080"

    networks:
      - simpleauth-net

    # Resource limits — adjust to your workload
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy with production TLS termination
  # Activate with: docker compose --profile full up -d
  # ---------------------------------------------------------------------------
  nginx:
    profiles: ["full"]
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: simpleauth-nginx
    restart: unless-stopped
    depends_on:
      simpleauth:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Mount your real TLS certificates here
      - ./deploy/nginx/certs/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./deploy/nginx/certs/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      # Optional: mount custom nginx.conf
      # - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    networks:
      - simpleauth-net

    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  simpleauth-data:
    driver: local

networks:
  simpleauth-net:
    driver: bridge
