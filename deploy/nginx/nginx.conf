# =============================================================================
# SimpleAuth — Production Nginx Configuration
# =============================================================================
# Features:
#   - TLS 1.2/1.3 termination with modern cipher suite
#   - HTTP -> HTTPS redirect
#   - Reverse proxy to SimpleAuth backend
#   - Large header buffers for Kerberos/SPNEGO Negotiate tokens
#   - Rate limiting
#   - Security headers
#   - Gzip compression
# =============================================================================

# Worker tuning — auto-detect CPU cores
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    # -------------------------------------------------------------------------
    # Core settings
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout   65;
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;

    # Hide nginx version from response headers
    server_tokens off;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Rate limiting
    # -------------------------------------------------------------------------
    # Zone: 10MB shared memory (~160k IPs), 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

    # Separate stricter zone for login/token endpoints
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/javascript
        text/xml;

    # -------------------------------------------------------------------------
    # Upstream — SimpleAuth backend
    # -------------------------------------------------------------------------
    upstream simpleauth {
        server simpleauth:8080;

        # Keep connections alive to the backend
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP -> HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME challenge support (for Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS — main server
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        # Set this to your FQDN
        server_name _;

        # ----- TLS Configuration (Modern) ------------------------------------
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # TLS 1.2 + 1.3 only (no legacy SSLv3, TLSv1.0, TLSv1.1)
        ssl_protocols TLSv1.2 TLSv1.3;

        # Modern cipher suite — prefers server order
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling (enable if your CA supports it)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # ----- Buffers for Kerberos/SPNEGO ------------------------------------
        # SPNEGO Negotiate tokens can be very large (8-64KB+).
        # These buffer sizes prevent 502 errors during Kerberos auth.
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
        large_client_header_buffers 4 64k;

        # Allow large Authorization headers (Negotiate tokens)
        client_header_buffer_size 64k;

        # ----- Security Headers -----------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # CSP — adjust as needed for your UI
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

        # ----- Health check (no rate limit, no logging) -----------------------
        location = /health {
            access_log off;
            proxy_pass https://simpleauth;
            proxy_ssl_verify off;
        }

        # ----- Login endpoints (stricter rate limit) --------------------------
        location ~ ^/api/(auth|token) {
            limit_req zone=login_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass https://simpleauth;
            proxy_ssl_verify off;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Forward the full Authorization header (critical for SPNEGO Negotiate)
            proxy_pass_header Authorization;
            proxy_pass_header WWW-Authenticate;
        }

        # ----- All other requests ---------------------------------------------
        location / {
            limit_req zone=auth_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass https://simpleauth;
            proxy_ssl_verify off;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Forward Kerberos headers
            proxy_pass_header Authorization;
            proxy_pass_header WWW-Authenticate;

            # WebSocket support (if needed in future)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ----- Error pages ----------------------------------------------------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
